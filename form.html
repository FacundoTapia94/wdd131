<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Assigment</title>
    <meta name="description" content="Form Assigment, Dynamic Web Fundamentals">
    <meta name="author" content="Facundo Tapia">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="wf1">
            <fieldset>
                <p>Product Name</p>
                <select name="selection" id="selection" required>
                    <option value="" disabled selected>Select a Product ...</option>

                </select>

                <p>Overall Rating</p>
                <label><input type="radio" id="rating1" name="rating" value="☆" required>⭐</label>
                <label><input type="radio" id="rating2" name="rating" value="☆☆">⭐⭐</label>
                <label><input type="radio" id="rating3" name="rating" value="☆☆☆">⭐⭐⭐</label>
                <label><input type="radio" id="rating4" name="rating" value="☆☆☆☆">⭐⭐⭐⭐</label>
                <label><input type="radio" id="rating5" name="rating" value="☆☆☆☆☆">⭐⭐⭐⭐⭐</label>



                <p>Date of Installation</p>
                <input type="date" id="date" name="date" required>

                <p>Which features did you find useful in the product?
                    (Check all that apply)
                </p>
               
                <label><input type="checkbox" id="feature1" name="features" value="duravility">Duravility</label>
                <label><input type="checkbox" id="feature2" name="features" value="ease-of-use">Ease of Use</label>
                <label><input type="checkbox" id="feature3" name="features" value="performance">Performance</label>
                <label><input type="checkbox" id="feature4" name="features" value="desing">Design</label>

                <p>Written review (optional)</p>
                <textarea id="review" name="review" rows="4" cols="40"></textarea>

                <p>User Name (optional)</p>
                <input type="text" id="user" name="user">

                <p></p>
                <input type="submit" value="Submit Review">
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> | Facundo Javier Tapia | Argentina </p>
        <div class="lastmodification">
            <p> Last Modification: <span id="lastModified"></span></p>
        </div>
    </footer>


    
</body>
</html>
